<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow - Create Task</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #1a1a2e;
      --bg-card: #16213e;
      --border-color: rgba(255,255,255,0.08);
      --text-main: #ffffff;
      --text-muted: #cbd5e1;
      --accent: #4CAF50;
      --accent-hover: #43a047;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      min-height: 100vh;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(76,175,80,0.04) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(99,102,241,0.04) 0%, transparent 40%);
      background-attachment: fixed;
    }

    #taskFormContent {
      display: none;
      flex-direction: column;
      width: 100%;
      min-height: 100vh;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 75px;
      background-color: var(--bg-card);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 2rem;
      z-index: 1000;
      backdrop-filter: blur(16px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .header-left, .header-right { display: flex; align-items: center; gap: 1.5rem; }
    .logo-container { display: flex; align-items: center; gap: 0.6rem; }
    .logo-icon { font-size: 1.6rem; }
    .logo-text {
      font-size: 1.35rem;
      font-weight: 700;
      background: linear-gradient(to right, #ffffff, #e2e8f0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    nav { display: flex; align-items: center; gap: 0.35rem; }
    .nav-link {
      color: var(--text-muted);
      text-decoration: none;
      padding: 0.52rem 0.95rem;
      border-radius: 8px;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    .nav-link:hover { color: var(--text-main); background: rgba(255,255,255,0.05); }
    .nav-link.active {
      color: #fff;
      background: rgba(76,175,80,0.15);
      border: 1px solid rgba(76,175,80,0.3);
    }

    .welcome-text { font-weight: 500; color: var(--text-main); }
    .btn-logout {
      background: rgba(239,68,68,0.1);
      color: #fda4af;
      border: 1px solid rgba(239,68,68,0.2);
      padding: 0.54rem 0.95rem;
      border-radius: 8px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-logout:hover { background: var(--danger); color: white; }

    .mobile-menu-btn { display: none; background: none; border: none; color: var(--text-main); font-size: 1.5rem; cursor: pointer; }

    .main-container {
      margin-top: 75px;
      width: 100%;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
      padding: 2.5rem 1.25rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 1.6rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.3);
    }

    .page-title { margin-bottom: 1rem; }
    .page-title h1 { font-size: 1.6rem; font-weight: 700; }
    .page-title p { color: var(--text-muted); margin-top: 0.25rem; }

    .status-banner {
      margin-bottom: 1rem;
      padding: 0.8rem 0.95rem;
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      color: var(--text-muted);
      border: 1px solid var(--border-color);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1rem;
    }

    .field { display: flex; flex-direction: column; gap: 0.45rem; }
    .field.full { grid-column: 1 / -1; }
    label { font-size: 0.9rem; color: var(--text-muted); font-weight: 600; }
    input, select, textarea {
      padding: 0.8rem 0.9rem;
      border-radius: 10px;
      border: 1px solid var(--border-color);
      background: rgba(255,255,255,0.04);
      color: var(--text-main);
      font-family: inherit;
      outline: none;
      width: 100%;
    }
    textarea { min-height: 110px; resize: vertical; }
    input:focus, select:focus, textarea:focus {
      border-color: rgba(76,175,80,0.4);
      box-shadow: 0 0 0 3px rgba(76,175,80,0.12);
    }

    .actions { display: flex; gap: 0.75rem; margin-top: 1.2rem; flex-wrap: wrap; }
    .btn {
      padding: 0.8rem 1rem;
      border-radius: 10px;
      border: none;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #66bb6a);
      color: white;
      box-shadow: 0 8px 20px rgba(76,175,80,0.2);
    }
    .btn-primary:hover { background: linear-gradient(135deg, var(--accent-hover), var(--accent)); }
    .btn-secondary {
      background: rgba(255,255,255,0.06);
      color: var(--text-main);
      border: 1px solid var(--border-color);
    }
    .btn:hover { transform: translateY(-1px); }

    .message {
      margin-top: 1rem;
      padding: 0.8rem 0.95rem;
      border-radius: 10px;
      display: none;
      font-weight: 600;
    }
    .message.success { display: block; background: rgba(76,175,80,0.14); color: #86efac; }
    .message.error { display: block; background: rgba(239,68,68,0.14); color: #fda4af; }

    @media (max-width: 860px) {
      header { padding: 0 1.25rem; }
      nav {
        display: none;
        position: fixed;
        top: 75px;
        left: 0;
        right: 0;
        background: var(--bg-card);
        border-bottom: 1px solid var(--border-color);
        flex-direction: column;
        padding: 1.5rem;
        gap: 1rem;
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      }
      nav.active { display: flex; }
      .mobile-menu-btn { display: block; }
      .welcome-text { display: none; }
      .main-container { padding: 1.5rem 1rem; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="taskFormContent">
    <header>
      <div class="header-left">
        <div class="logo-container">
          <span class="logo-icon">✅</span>
          <span class="logo-text">TaskFlow</span>
        </div>
        <nav id="topNav">
          <a href="dashboard.html" class="nav-link">Dashboard</a>
          <a href="tasks.html" class="nav-link active">Tasks</a>
          <a href="team.html" class="nav-link">Team</a>
          <a href="settings.html" class="nav-link">Settings</a>
        </nav>
      </div>
      <div class="header-right">
        <span class="welcome-text" id="welcomeMsg">Welcome</span>
        <button class="btn-logout" onclick="handleLogout(event)">Logout</button>
        <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>
      </div>
    </header>

    <main class="main-container">
      <section class="card">
        <div class="page-title">
          <h1 id="pageTitle">Create Task</h1>
          <p id="pageSubtitle">Assign a new task to a team member</p>
        </div>

        <div id="statusBanner" class="status-banner">Loading employees…</div>

        <form id="taskForm" onsubmit="handleSubmit(event)">
          <div class="form-grid">
            <div class="field full">
              <label for="title">Title</label>
              <input id="title" name="title" required />
            </div>

            <div class="field full">
              <label for="description">Description</label>
              <textarea id="description" name="description"></textarea>
            </div>

            <div class="field">
              <label for="assigned_to">Assign To</label>
              <select id="assigned_to" name="assigned_to" required></select>
            </div>

            <div class="field">
              <label for="priority">Priority</label>
              <select id="priority" name="priority">
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
              </select>
            </div>

            <div class="field">
              <label for="due_date">Due Date</label>
              <input id="due_date" name="due_date" type="date" required />
            </div>

            <div class="field">
              <label for="status">Status</label>
              <select id="status" name="status">
                <option value="pending">Pending</option>
                <option value="completed">Completed</option>
              </select>
            </div>
          </div>

          <div class="actions">
            <button class="btn btn-primary" type="submit" id="submitBtn">Save Task</button>
            <button class="btn btn-secondary" type="button" onclick="window.location.href='tasks.html'">Cancel</button>
          </div>

          <div id="formMessage" class="message"></div>
        </form>
      </section>
    </main>
  </div>

  <script>
    let currentUser = null;
    let editingTaskId = null;

    const user = JSON.parse(localStorage.getItem('taskflow_user'));
    if (!user) window.location.href = 'index.html';
    if (user && user.role === 'employee') window.location.href = 'my-tasks.html';
    if (user && user.role !== 'employee') {
      currentUser = user;
      document.getElementById('taskFormContent').style.display = 'flex';
    }

    document.addEventListener('DOMContentLoaded', async () => {
      if (!currentUser) return;
      document.getElementById('welcomeMsg').textContent = `Welcome, ${currentUser.name}`;
      await loadEmployees();
      await loadTaskForEdit();
    });

    function toggleMobileMenu() {
      document.getElementById('topNav').classList.toggle('active');
    }

    function handleLogout(event) {
      if (event) event.preventDefault();
      localStorage.removeItem('taskflow_user');
      window.location.href = 'index.html';
    }

    async function loadEmployees() {
      const select = document.getElementById('assigned_to');
      const banner = document.getElementById('statusBanner');
      try {
        banner.textContent = 'Loading employees…';
        const res = await fetch('/users?status=active');
        if (!res.ok) throw new Error('Unable to load employees');
        const users = await res.json();
        select.innerHTML = '<option value="">Select employee</option>';

        users.filter(user => user && user.id).forEach(user => {
          const option = document.createElement('option');
          option.value = user.id;
          option.textContent = user.name;
          select.appendChild(option);
        });

        banner.textContent = editingTaskId ? 'Editing task details…' : 'Choose an employee to assign the task.';
      } catch (err) {
        console.error(err);
        banner.textContent = err.message;
        showMessage(err.message, 'error');
      }
    }

    async function loadTaskForEdit() {
      const taskId = localStorage.getItem('edit_task_id');
      if (!taskId) {
        document.getElementById('statusBanner').textContent = 'Create a new task for your team.';
        return;
      }

      editingTaskId = Number(taskId);
      document.getElementById('pageTitle').textContent = 'Edit Task';
      document.getElementById('pageSubtitle').textContent = 'Update the selected task details';
      document.getElementById('submitBtn').textContent = 'Save Task';
      document.getElementById('statusBanner').textContent = 'Loading selected task…';

      try {
        const res = await fetch('/tasks');
        if (!res.ok) throw new Error('Unable to load task details');
        const tasks = await res.json();
        const task = tasks.find(item => Number(item.id) === editingTaskId);
        if (!task) throw new Error('Task not found');

        document.getElementById('title').value = task.title || '';
        document.getElementById('description').value = task.description || '';
        document.getElementById('assigned_to').value = task.assigned_to || '';
        document.getElementById('priority').value = task.priority || 'medium';
        document.getElementById('due_date').value = task.due_date ? task.due_date.split('T')[0] : '';
        document.getElementById('status').value = task.status || 'pending';
        document.getElementById('statusBanner').textContent = 'Task loaded. Update the details and save.';
      } catch (err) {
        console.error(err);
        document.getElementById('statusBanner').textContent = err.message;
        showMessage(err.message, 'error');
      }
    }

    async function handleSubmit(event) {
      event.preventDefault();
      const form = document.getElementById('taskForm');
      const title = form.title.value.trim();
      const description = form.description.value.trim();
      const assignedTo = form.assigned_to.value;
      const priority = form.priority.value;
      const dueDate = form.due_date.value;
      const status = form.status.value;

      if (!title) {
        showMessage('Title is required.', 'error');
        return;
      }
      if (!assignedTo) {
        showMessage('Please select an employee.', 'error');
        return;
      }
      if (!dueDate) {
        showMessage('Due date is required.', 'error');
        return;
      }

      const payload = {
        title,
        description,
        assigned_to: assignedTo,
        priority,
        due_date: dueDate,
        status,
        created_by: currentUser.id
      };

      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.textContent = editingTaskId ? 'Saving...' : 'Creating...';

      try {
        let res;
        if (editingTaskId) {
          res = await fetch(`/tasks/${editingTaskId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status })
          });
        } else {
          res = await fetch('/tasks', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
        }

        if (!res.ok) {
          const errorData = await res.json().catch(() => ({}));
          throw new Error(errorData.error || 'Unable to save task');
        }

        localStorage.removeItem('edit_task_id');
        showMessage(editingTaskId ? 'Task updated successfully.' : 'Task created successfully.', 'success');
        setTimeout(() => {
          window.location.href = 'tasks.html';
        }, 800);
      } catch (err) {
        console.error(err);
        showMessage(err.message, 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = editingTaskId ? 'Save Task' : 'Save Task';
      }
    }

    function showMessage(message, type) {
      const box = document.getElementById('formMessage');
      box.textContent = message;
      box.className = `message ${type}`;
    }
  </script>
</body>
</html>

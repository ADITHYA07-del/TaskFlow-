<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow - My Tasks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #1a1a2e;
      --bg-card: #16213e;
      --border-color: rgba(255,255,255,0.08);
      --text-main: #ffffff;
      --text-muted: #cbd5e1;
      --accent: #4CAF50;
      --accent-hover: #43a047;
      --warning: #f59e0b;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(76,175,80,0.04) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(99,102,241,0.04) 0%, transparent 40%);
      background-attachment: fixed;
    }

    #pageContent { display: none; flex-direction: column; width: 100%; min-height: 100vh; }

    header {
      position: sticky;
      top: 0;
      height: 75px;
      background-color: var(--bg-card);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 2rem;
      z-index: 1000;
      backdrop-filter: blur(16px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .header-left, .header-right { display: flex; align-items: center; gap: 1.5rem; }
    .logo-container { display: flex; align-items: center; gap: 0.6rem; }
    nav { display: flex; align-items: center; gap: 0.35rem; }
    .nav-link {
      color: var(--text-muted);
      text-decoration: none;
      padding: 0.52rem 0.95rem;
      border-radius: 8px;
      font-weight: 500;
      transition: all 0.2s ease;
      font-size: 0.95rem;
    }
    .nav-link:hover { color: var(--text-main); background: rgba(255,255,255,0.05); }
    .nav-link.active {
      color: #fff;
      background: rgba(76, 175, 80, 0.15);
      border: 1px solid rgba(76, 175, 80, 0.3);
      box-shadow: 0 0 10px rgba(76, 175, 80, 0.08);
    }
    .mobile-menu-btn { display: none; background: none; border: none; color: var(--text-main); font-size: 1.5rem; cursor: pointer; }
    .logo-icon { font-size: 1.6rem; }
    .logo-text {
      font-size: 1.35rem;
      font-weight: 700;
      background: linear-gradient(to right, #ffffff, #e2e8f0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .welcome-text { font-weight: 500; color: var(--text-main); }
    .btn-logout {
      background: rgba(239,68,68,0.1);
      color: #fda4af;
      border: 1px solid rgba(239,68,68,0.2);
      padding: 0.54rem 0.95rem;
      border-radius: 8px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-logout:hover { background: var(--danger); color: white; }

    .main-container {
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem 1.25rem 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .page-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .page-title h1 { font-size: 1.6rem; font-weight: 700; }
    .page-title p { color: var(--text-muted); margin-top: 0.25rem; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 18px;
      padding: 1.2rem 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }

    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.25);
    }

    .stat-label {
      color: var(--text-muted);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.45rem;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 700;
    }

    .stat-icon {
      font-size: 1.4rem;
      opacity: 0.9;
    }

    .task-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1rem;
    }

    .task-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 1.15rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .task-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.25);
    }

    .task-card h3 { font-size: 1.05rem; }
    .task-meta { color: var(--text-muted); font-size: 0.92rem; line-height: 1.5; }

    .badge {
      display: inline-block;
      width: fit-content;
      padding: 0.28rem 0.7rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: capitalize;
      border: 1px solid transparent;
    }
    .badge-high { background: rgba(239,68,68,0.16); color: #fda4af; border-color: rgba(239,68,68,0.2); }
    .badge-medium { background: rgba(245,158,11,0.16); color: #fcd34d; border-color: rgba(245,158,11,0.2); }
    .badge-low { background: rgba(76,175,80,0.16); color: #86efac; border-color: rgba(76,175,80,0.2); }
    .badge-completed { background: rgba(76,175,80,0.16); color: #86efac; border-color: rgba(76,175,80,0.2); }
    .badge-pending { background: rgba(107,114,128,0.16); color: #d1d5db; border-color: rgba(107,114,128,0.2); }
    .badge-done { background: rgba(245,158,11,0.16); color: #fcd34d; border-color: rgba(245,158,11,0.2); }
    .badge-partial_complete { background: rgba(2,132,199,0.16); color: #7dd3fc; border-color: rgba(2,132,199,0.2); }
    .badge-overdue { background: rgba(239,68,68,0.16); color: #fda4af; border-color: rgba(239,68,68,0.2); }

    .btn-complete {
      background: linear-gradient(135deg, var(--accent), #66bb6a);
      color: white;
      border: none;
      padding: 0.7rem 0.9rem;
      border-radius: 10px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-complete:hover { transform: translateY(-1px); }
    .btn-complete:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

    .state {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 2rem 1rem;
      text-align: center;
      color: var(--text-muted);
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(76,175,80,0.16);
      border-left-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 0.8rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 860px) {
      header { padding: 0 1rem; }
      nav {
        display: none;
        position: fixed;
        top: 75px;
        left: 0;
        right: 0;
        background: var(--bg-card);
        border-bottom: 1px solid var(--border-color);
        flex-direction: column;
        padding: 1rem;
        gap: 0.75rem;
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      }
      nav.active { display: flex; }
      .mobile-menu-btn { display: block; }
      .welcome-text { display: none; }
      .main-container { padding: 1rem 0.9rem 2rem; }
    }
  </style>
</head>
<body>
  <div id="pageContent">
    <header>
      <div class="header-left">
        <div class="logo-container">
          <span class="logo-icon">✅</span>
          <span class="logo-text">TaskFlow</span>
        </div>
        <nav id="topNav">
          <a href="my-tasks.html" class="nav-link active">My Tasks</a>
          <a href="settings.html" class="nav-link">Settings</a>
        </nav>
      </div>
      <div class="header-right">
        <span class="welcome-text" id="welcomeMsg">Welcome</span>
        <button class="btn-logout" onclick="handleLogout(event)">Logout</button>
        <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>
      </div>
    </header>

    <main class="main-container">
      <section class="page-title">
        <div>
          <h1>My Tasks</h1>
          <p>View your assigned work and mark tasks complete.</p>
        </div>
      </section>

      <section class="stats-grid">
        <div class="stat-card">
          <div>
            <div class="stat-label">Total Tasks</div>
            <div class="stat-value" id="statTotal">0</div>
          </div>
          <div class="stat-icon">📋</div>
        </div>
        <div class="stat-card">
          <div>
            <div class="stat-label">Pending Tasks</div>
            <div class="stat-value" id="statPending">0</div>
          </div>
          <div class="stat-icon">⏳</div>
        </div>
        <div class="stat-card">
          <div>
            <div class="stat-label">Completed Tasks</div>
            <div class="stat-value" id="statCompleted">0</div>
          </div>
          <div class="stat-icon">✅</div>
        </div>
      </section>

      <section id="tasksContainer">
        <div id="loadingState" class="state">
          <div class="spinner"></div>
          <p>Loading your tasks...</p>
        </div>
      </section>
    </main>
  </div>

  <script>
    let currentUser = null;

    const user = JSON.parse(localStorage.getItem('taskflow_user'));
    if (!user) window.location.href = 'index.html';
    if (user && user.role === 'manager') window.location.href = 'dashboard.html';
    if (user && user.role === 'employee') {
      currentUser = user;
      document.getElementById('pageContent').style.display = 'flex';
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (!currentUser) return;
      document.getElementById('welcomeMsg').textContent = `My Tasks - ${currentUser.name}`;
      loadMyTasks();
    });

    function toggleMobileMenu() {
      document.getElementById('topNav').classList.toggle('active');
    }

    function handleLogout(event) {
      if (event) event.preventDefault();
      localStorage.removeItem('taskflow_user');
      window.location.href = 'index.html';
    }

    async function loadMyTasks() {
      const container = document.getElementById('tasksContainer');
      container.innerHTML = '<div id="loadingState" class="state"><div class="spinner"></div><p>Loading your tasks...</p></div>';

      try {
        const res = await fetch(`/tasks/my?user_id=${currentUser.id}`);
        if (!res.ok) throw new Error('Unable to load your tasks');
        const tasks = await res.json();

        updateStats(tasks);

        if (!tasks || tasks.length === 0) {
          container.innerHTML = '<div class="state"><h3>No tasks assigned.</h3><p>You do not have any tasks right now.</p></div>';
          return;
        }

        const grid = document.createElement('div');
        grid.className = 'task-grid';

        tasks.forEach(task => {
          const card = document.createElement('article');
          card.className = 'task-card';

          const status = getTaskStatus(task);
          const statusMeta = getStatusMeta(task);
          const priority = getPriority(task.priority);

          card.innerHTML = `
            <div class="task-meta">
              <span class="badge badge-${priority.className}">${priority.label}</span>
              <span class="badge badge-${statusMeta.className}">${statusMeta.label}</span>
            </div>
            <h3>${escapeHtml(task.title || 'Untitled Task')}</h3>
            <p class="task-meta">${escapeHtml(task.description || 'No description provided.')}</p>
            <div class="task-meta"><strong>Due:</strong> ${formatDate(task.due_date)}</div>
            ${status === 'pending' ? `<button class="btn-complete" onclick="markAsDone(${task.id})">Mark as Done</button>` : ''}
          `;

          grid.appendChild(card);
        });

        container.innerHTML = '';
        container.appendChild(grid);
      } catch (err) {
        console.error(err);
        container.innerHTML = `<div class="state"><h3>Unable to load tasks</h3><p>${escapeHtml(err.message)}</p></div>`;
      }
    }

    async function markAsDone(taskId) {
      try {
        const res = await fetch(`/tasks/${taskId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: 'done' })
        });

        if (!res.ok) throw new Error('Unable to update task');
        loadMyTasks();
      } catch (err) {
        console.error(err);
        alert(err.message);
      }
    }

    function updateStats(tasksList) {
      const total = tasksList.length;
      const completed = tasksList.filter(task => getTaskStatus(task) === 'completed').length;
      const pending = tasksList.filter(task => ['pending', 'done', 'partial_complete'].includes(getTaskStatus(task))).length;
      document.getElementById('statTotal').textContent = total;
      document.getElementById('statPending').textContent = pending;
      document.getElementById('statCompleted').textContent = completed;
    }

    function getTaskStatus(task) {
      const status = String(task.status || '').trim().toLowerCase();
      if (status === 'done') return 'done';
      if (status === 'partial_complete') return 'partial_complete';
      if (status === 'completed') return 'completed';
      if (status === 'pending') return 'pending';
      if (isOverdue(task)) return 'overdue';
      return 'pending';
    }

    function getStatusMeta(task) {
      const status = getTaskStatus(task);
      if (status === 'done') return { label: 'Pending Approval', className: 'done' };
      if (status === 'partial_complete') return { label: 'Approved - Awaiting Payment', className: 'partial_complete' };
      if (status === 'completed') return { label: 'Completed', className: 'completed' };
      if (status === 'overdue') return { label: 'Overdue', className: 'overdue' };
      return { label: 'Pending', className: 'pending' };
    }

    function getPriority(priority) {
      const value = String(priority || '').toLowerCase();
      if (value === 'high') return { label: 'High', className: 'high' };
      if (value === 'medium') return { label: 'Medium', className: 'medium' };
      return { label: 'Low', className: 'low' };
    }

    function isOverdue(task) {
      if (!task.due_date || (task.status && task.status.toLowerCase() === 'completed')) return false;
      const today = new Date().toISOString().split('T')[0];
      const due = new Date(task.due_date).toISOString().split('T')[0];
      return due < today;
    }

    function formatDate(dateStr) {
      if (!dateStr) return 'N/A';
      try {
        return new Date(dateStr).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
      } catch {
        return dateStr;
      }
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow - Manager Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #1a1a2e;
      --bg-card: #16213e;
      --border-color: rgba(255, 255, 255, 0.08);
      --text-main: #ffffff;
      --text-muted: #cbd5e1;
      
      --accent: #4CAF50;
      --accent-hover: #43a047;
      --accent-glow: rgba(76, 175, 80, 0.25);
      
      --info: #0284c7;
      --info-glow: rgba(2, 132, 199, 0.15);
      --warning: #f59e0b;
      --warning-glow: rgba(245, 158, 11, 0.15);
      --danger: #ef4444;
      --danger-glow: rgba(239, 68, 68, 0.15);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(76, 175, 80, 0.04) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(99, 102, 241, 0.04) 0%, transparent 40%);
      background-attachment: fixed;
    }

    /* AUTH CHECK HIDDEN CONTAINER */
    #dashboardContent {
      display: none;
      flex-direction: column;
      width: 100%;
    }

    /* FIXED TOP HEADER */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 75px;
      background-color: var(--bg-card);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 2rem;
      z-index: 1000;
      backdrop-filter: blur(16px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logo-icon {
      font-size: 1.8rem;
    }

    .logo-text {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      background: linear-gradient(to right, #ffffff, #e2e8f0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* NAVIGATION */
    nav {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .nav-link {
      color: var(--text-muted);
      text-decoration: none;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-weight: 500;
      transition: all 0.3s ease;
      font-size: 0.95rem;
    }

    .nav-link:hover {
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.05);
    }

    .nav-link.active {
      color: #fff;
      background: rgba(76, 175, 80, 0.15);
      border: 1px solid rgba(76, 175, 80, 0.3);
      box-shadow: 0 0 10px rgba(76, 175, 80, 0.1);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .welcome-text {
      font-weight: 500;
      color: var(--text-main);
      font-size: 0.95rem;
    }

    .btn-logout {
      background: rgba(239, 68, 68, 0.1);
      color: #fda4af;
      border: 1px solid rgba(239, 68, 68, 0.2);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-logout:hover {
      background: #ef4444;
      color: white;
      box-shadow: 0 0 12px var(--danger-glow);
    }

    /* MOBILE NAVIGATION */
    .mobile-menu-btn {
      display: none;
      background: none;
      border: none;
      color: var(--text-main);
      font-size: 1.5rem;
      cursor: pointer;
    }

    /* MAIN CONTAINER */
    .main-container {
      margin-top: 75px;
      padding: 2.5rem 2rem;
      max-width: 1200px;
      width: 100%;
      margin-left: auto;
      margin-right: auto;
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
    }

    /* STATS GRID */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.3s ease;
      position: relative;
    }

    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .stat-info h3 {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .stat-value {
      font-size: 2.25rem;
      font-weight: 700;
    }

    .stat-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }

    /* Stat styling */
    .stat-total { border-left: 4px solid var(--info); }
    .stat-total .stat-icon { background: var(--info-glow); color: var(--info); }
    .stat-completed { border-left: 4px solid var(--accent); }
    .stat-completed .stat-icon { background: var(--accent-glow); color: var(--accent); }
    .stat-pending { border-left: 4px solid var(--warning); }
    .stat-pending .stat-icon { background: var(--warning-glow); color: var(--warning); }
    .stat-overdue { border-left: 4px solid var(--danger); }
    .stat-overdue .stat-icon { background: var(--danger-glow); color: var(--danger); }

    /* CONTENT CARD (RECENT TASKS) */
    .content-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 2rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .card-title {
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    /* TABLE */
    .table-container {
      width: 100%;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th {
      padding: 1rem;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border-color);
      font-weight: 600;
    }

    td {
      padding: 1.1rem 1rem;
      font-size: 0.95rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background: rgba(255, 255, 255, 0.01);
    }

    .task-title {
      font-weight: 500;
      color: var(--text-main);
    }

    .user-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .user-avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-main);
    }

    .badge-status {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: capitalize;
    }

    .status-completed {
      background: rgba(76, 175, 80, 0.15);
      color: var(--accent);
      border: 1px solid rgba(76, 175, 80, 0.2);
    }

    .status-pending {
      background: rgba(245, 158, 11, 0.15);
      color: var(--warning);
      border: 1px solid rgba(245, 158, 11, 0.2);
    }

    .status-overdue {
      background: rgba(239, 68, 68, 0.15);
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .due-date {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* STATES */
    .loading-state, .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      text-align: center;
      gap: 1rem;
    }

    .loading-spinner {
      border: 3px solid rgba(76, 175, 80, 0.1);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border-left-color: var(--accent);
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .empty-state-icon {
      font-size: 3rem;
      opacity: 0.6;
    }

    .empty-state h3 {
      font-size: 1.2rem;
      font-weight: 600;
    }

    .empty-state p {
      color: var(--text-muted);
      max-width: 320px;
      font-size: 0.9rem;
    }

    /* RESPONSIVE DESIGN */
    @media (max-width: 820px) {
      header {
        padding: 0 1.25rem;
      }

      nav {
        display: none;
        position: fixed;
        top: 75px;
        left: 0;
        right: 0;
        background: var(--bg-card);
        border-bottom: 1px solid var(--border-color);
        flex-direction: column;
        padding: 1.5rem;
        gap: 1rem;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
      }

      nav.active {
        display: flex;
      }

      .mobile-menu-btn {
        display: block;
      }

      .welcome-text {
        display: none;
      }

      .main-container {
        padding: 1.5rem 1rem;
      }
    }
  </style>
</head>
<body>
  
  <div id="dashboardContent">
    <!-- FIXED HEADER -->
    <header>
      <div class="header-left">
        <div class="logo-container">
          <span class="logo-icon">✅</span>
          <span class="logo-text">TaskFlow</span>
        </div>
        
        <!-- HEADER NAVIGATION -->
        <nav id="topNav">
          <a href="dashboard.html" class="nav-link active">Dashboard</a>
          <a href="tasks.html" class="nav-link">Tasks</a>
          <a href="team.html" class="nav-link">Team</a>
          <a href="settings.html" class="nav-link">Settings</a>
        </nav>
      </div>

      <div class="header-right">
        <span class="welcome-text" id="welcomeMsg">Welcome, User</span>
        <button class="btn-logout" onclick="handleLogout(event)">Logout</button>
        <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>
      </div>
    </header>

    <!-- MAIN CONTAINER -->
    <main class="main-container">
      
      <!-- STATISTICS CARDS -->
      <section class="stats-grid">
        <div class="stat-card stat-total">
          <div class="stat-info">
            <h3>Total Tasks</h3>
            <div class="stat-value" id="statTotal">-</div>
          </div>
          <div class="stat-icon">📂</div>
        </div>
        
        <div class="stat-card stat-completed">
          <div class="stat-info">
            <h3>Completed Tasks</h3>
            <div class="stat-value" id="statCompleted">-</div>
          </div>
          <div class="stat-icon">✔️</div>
        </div>

        <div class="stat-card stat-pending">
          <div class="stat-info">
            <h3>Pending Tasks</h3>
            <div class="stat-value" id="statPending">-</div>
          </div>
          <div class="stat-icon">⏳</div>
        </div>

        <div class="stat-card stat-overdue">
          <div class="stat-info">
            <h3>Overdue Tasks</h3>
            <div class="stat-value" id="statOverdue">-</div>
          </div>
          <div class="stat-icon">⚠️</div>
        </div>
      </section>

      <!-- RECENT TASKS -->
      <section class="content-card">
        <div class="card-header">
          <h3 class="card-title">Recent Tasks</h3>
        </div>

        <!-- States -->
        <div id="loadingState" class="loading-state">
          <div class="loading-spinner"></div>
          <p style="color: var(--text-muted)">Fetching dashboard information...</p>
        </div>

        <div id="emptyState" class="empty-state" style="display: none;">
          <div class="empty-state-icon">📂</div>
          <h3 id="emptyStateTitle">No tasks found</h3>
          <p id="emptyStateText">There are currently no tasks listed in the system.</p>
        </div>

        <div id="tableWrapper" class="table-container" style="display: none;">
          <table>
            <thead>
              <tr>
                <th>Title</th>
                <th>Assigned To</th>
                <th>Status</th>
                <th>Due Date</th>
              </tr>
            </thead>
            <tbody id="tasksTableBody">
              <!-- Populated via script -->
            </tbody>
          </table>
        </div>
      </section>

    </main>
  </div>

  <script>
    // -------------------------------------------------------------
    // AUTHENTICATION CHECK
    // -------------------------------------------------------------
    let currentUser = null;

    (function checkAuth() {
      const userStr = localStorage.getItem('taskflow_user');
      if (!userStr) {
        window.location.href = 'index.html';
        return;
      }
      
      try {
        currentUser = JSON.parse(userStr);
        if (!currentUser || !currentUser.role) {
          throw new Error('Invalid authentication session');
        }
        
        if (currentUser.role === 'employee') {
          window.location.href = 'my-tasks.html';
          return;
        }
        
        // Render dashboard elements if manager
        document.getElementById('dashboardContent').style.display = 'flex';
      } catch (err) {
        console.error('Session validation error:', err);
        localStorage.removeItem('taskflow_user');
        window.location.href = 'index.html';
      }
    })();

    // -------------------------------------------------------------
    // DYNAMIC ACTIONS & DOM INITIALIZATION
    // -------------------------------------------------------------
    let userMap = {}; // Maps: user.id (integer) -> user.name

    document.addEventListener('DOMContentLoaded', () => {
      if (!currentUser) return;

      // Update welcome text in header
      document.getElementById('welcomeMsg').textContent = `Welcome, ${currentUser.name}`;

      // Fetch users and tasks
      fetchDashboardData();
    });

    // Toggle menu dropdown on mobile screens
    function toggleMobileMenu() {
      const nav = document.getElementById('topNav');
      nav.classList.toggle('active');
    }

    // Logout
    function handleLogout(event) {
      if (event) event.preventDefault();
      localStorage.removeItem('taskflow_user');
      window.location.href = 'index.html';
    }

    // Fetch users and tasks from API endpoints
    async function fetchDashboardData() {
      const loading = document.getElementById('loadingState');
      const empty = document.getElementById('emptyState');
      const tableWrapper = document.getElementById('tableWrapper');
      const tableBody = document.getElementById('tasksTableBody');

      try {
        // 1. Fetch Users first
        const usersResponse = await fetch('/users');
        if (!usersResponse.ok) {
          throw new Error(`Failed to fetch user list (Status: ${usersResponse.status})`);
        }
        const users = await usersResponse.json();

        // Map integer id -> string name
        userMap = {};
        users.forEach(user => {
          if (user.id) {
            userMap[user.id] = user.name;
          }
        });

        // 2. Fetch Tasks
        const tasksResponse = await fetch('/tasks');
        if (!tasksResponse.ok) {
          throw new Error(`Failed to fetch tasks (Status: ${tasksResponse.status})`);
        }
        const tasks = await tasksResponse.json();

        // Compute Statistics
        calculateStatistics(tasks);

        if (!tasks || tasks.length === 0) {
          loading.style.display = 'none';
          tableWrapper.style.display = 'none';
          empty.style.display = 'flex';
          return;
        }

        // Sort Tasks: Latest first (ID descending)
        tasks.sort((a, b) => (b.id || 0) - (a.id || 0));

        // Populate Table
        tableBody.innerHTML = '';
        tasks.forEach(task => {
          const row = document.createElement('tr');

          // Title
          const titleCell = document.createElement('td');
          titleCell.className = 'task-title';
          titleCell.textContent = task.title;
          row.appendChild(titleCell);

          // Assigned To (mapping user id -> name)
          const assignedCell = document.createElement('td');
          const assigneeId = task.assigned_to;
          const assigneeName = userMap[assigneeId] || `Employee (ID: ${assigneeId})` || 'Unassigned';
          const avatarLetter = assigneeName.charAt(0).toUpperCase();

          assignedCell.innerHTML = `
            <div class="user-badge">
              <div class="user-avatar">${avatarLetter}</div>
              <span>${assigneeName}</span>
            </div>
          `;
          row.appendChild(assignedCell);

          // Status (Completed = green, Pending = orange, Overdue = red)
          const statusCell = document.createElement('td');
          const isOverdue = checkIsOverdue(task);
          
          let statusText = task.status || 'pending';
          let statusClass = 'status-pending';

          if (statusText.toLowerCase() === 'completed') {
            statusClass = 'status-completed';
          } else if (isOverdue) {
            statusText = 'overdue';
            statusClass = 'status-overdue';
          }

          statusCell.innerHTML = `<span class="badge-status ${statusClass}">${statusText}</span>`;
          row.appendChild(statusCell);

          // Due Date
          const dueCell = document.createElement('td');
          dueCell.className = 'due-date';
          dueCell.textContent = formatDate(task.due_date);
          row.appendChild(dueCell);

          tableBody.appendChild(row);
        });

        loading.style.display = 'none';
        empty.style.display = 'none';
        tableWrapper.style.display = 'block';

      } catch (err) {
        console.error('Dashboard data load error:', err);
        loading.style.display = 'none';
        tableWrapper.style.display = 'none';
        empty.style.display = 'flex';
        document.getElementById('emptyStateTitle').textContent = 'Error Loading Dashboard';
        document.getElementById('emptyStateText').textContent = err.message;
      }
    }

    // Determine if task is overdue
    function checkIsOverdue(task) {
      if (!task.due_date || (task.status && task.status.toLowerCase() === 'completed')) {
        return false;
      }
      const todayStr = new Date().toISOString().split('T')[0];
      const dueStr = new Date(task.due_date).toISOString().split('T')[0];
      return dueStr < todayStr;
    }

    // Format date beautifully
    function formatDate(dateStr) {
      if (!dateStr) return 'N/A';
      try {
        const options = { year: 'numeric', month: 'short', day: 'numeric' };
        return new Date(dateStr).toLocaleDateString(undefined, options);
      } catch (e) {
        return dateStr;
      }
    }

    // Compute Dashboard Statistics
    function calculateStatistics(tasks) {
      if (!tasks) return;

      const total = tasks.length;
      let completed = 0;
      let pending = 0;
      let overdue = 0;

      tasks.forEach(task => {
        const isCompleted = task.status && task.status.toLowerCase() === 'completed';
        const isOverdue = checkIsOverdue(task);

        if (isCompleted) {
          completed++;
        } else {
          pending++;
          if (isOverdue) {
            overdue++;
          }
        }
      });

      // Update counters
      document.getElementById('statTotal').textContent = total;
      document.getElementById('statCompleted').textContent = completed;
      document.getElementById('statPending').textContent = pending;
      document.getElementById('statOverdue').textContent = overdue;
    }
  </script>
</body>
</html>

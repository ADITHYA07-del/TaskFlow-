<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
  <script src="/auth.js"></script>
</head>
<body>
  <p>Redirecting to settings...</p>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const userId = TaskFlowAuth.getStoredUserId();
      if (!userId) {
        window.location.replace('/');
        return;
      }
      try {
        const res = await fetch('/auth/me?user_id=' + encodeURIComponent(userId), { cache: 'no-store' });
        if (!res.ok) {
          TaskFlowAuth.clearAuth();
          window.location.replace('/');
          return;
        }
        const user = await res.json();
        const target = TaskFlowAuth.isAdminRole(user.role) ? '/admin/settings' : '/member/settings';
        window.location.replace(target);
      } catch {
        window.location.replace('/');
      }
    });
  </script>
</body>
</html>

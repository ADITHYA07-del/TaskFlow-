<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow - Team Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-dark: #1a1a2e;
      --bg-card: #16213e;
      --border-color: rgba(255, 255, 255, 0.08);
      --text-main: #ffffff;
      --text-muted: #cbd5e1;
      --accent: #4CAF50;
      --accent-soft: rgba(76, 175, 80, 0.15);
      --accent-border: rgba(76, 175, 80, 0.25);
      --info: #0284c7;
      --info-soft: rgba(2, 132, 199, 0.16);
      --blue: #3b82f6;
      --blue-soft: rgba(59, 130, 246, 0.16);
      --danger: #ef4444;
      --danger-soft: rgba(239, 68, 68, 0.12);
      --warning: #f59e0b;
      --warning-soft: rgba(245, 158, 11, 0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(76, 175, 80, 0.04) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(99, 102, 241, 0.04) 0%, transparent 40%);
      background-attachment: fixed;
    }

    #teamContent {
      display: none;
      flex-direction: column;
      width: 100%;
    }

    header {
      position: sticky;
      top: 0;
      height: 75px;
      background-color: var(--bg-card);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 2rem;
      z-index: 1000;
      backdrop-filter: blur(16px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .header-left, .header-right {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .logo-icon { font-size: 1.6rem; }
    .logo-text {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(to right, #ffffff, #e2e8f0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    .nav-link {
      color: var(--text-muted);
      text-decoration: none;
      padding: 0.52rem 0.95rem;
      border-radius: 8px;
      font-weight: 500;
      transition: all 0.2s ease;
      font-size: 0.95rem;
    }

    .nav-link:hover {
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.05);
    }

    .nav-link.active {
      color: #fff;
      background: rgba(76, 175, 80, 0.15);
      border: 1px solid rgba(76, 175, 80, 0.3);
      box-shadow: 0 0 10px rgba(76, 175, 80, 0.08);
    }

    .welcome-text {
      font-weight: 500;
      color: var(--text-main);
      font-size: 0.95rem;
    }

    .mobile-menu-btn {
      display: none;
      background: none;
      border: none;
      color: var(--text-main);
      font-size: 1.5rem;
      cursor: pointer;
    }

    .btn-logout {
      background: rgba(239, 68, 68, 0.1);
      color: #fda4af;
      border: 1px solid rgba(239, 68, 68, 0.2);
      padding: 0.54rem 0.95rem;
      border-radius: 8px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-logout:hover {
      background: var(--danger);
      color: white;
      box-shadow: 0 0 12px rgba(239, 68, 68, 0.2);
    }

    .main-container {
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem 1.25rem 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .page-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .page-title h1 {
      font-size: 1.6rem;
      font-weight: 700;
    }

    .page-title p {
      color: var(--text-muted);
      margin-top: 0.25rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 18px;
      padding: 1.2rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    }

    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
    }

    .stat-label {
      color: var(--text-muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.4rem;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 700;
    }

    .stat-icon {
      font-size: 1.35rem;
      opacity: 0.9;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 1.2rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .section-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1rem;
    }

    .user-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .user-card .user-name {
      font-weight: 700;
      font-size: 1rem;
    }

    .user-card .user-email,
    .user-card .user-role {
      color: var(--text-muted);
      font-size: 0.92rem;
    }

    .pill {
      display: inline-flex;
      width: fit-content;
      padding: 0.28rem 0.7rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: capitalize;
      border: 1px solid transparent;
    }

    .pill.pending {
      background: var(--warning-soft);
      color: var(--warning);
      border-color: rgba(245, 158, 11, 0.2);
    }

    .pill.active {
      background: var(--accent-soft);
      color: var(--accent);
      border-color: var(--accent-border);
    }

    .actions-row {
      display: flex;
      gap: 0.55rem;
      flex-wrap: wrap;
      margin-top: auto;
    }

    .btn-approve {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
    }

    .btn-reject,
    .btn-delete {
      background: rgba(239, 68, 68, 0.16);
      color: #fda4af;
      border: none;
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
    }

    .btn-role {
      background: var(--info-soft);
      color: var(--info);
      border: none;
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
    }

    .btn-role-select {
      padding: 0.55rem 0.7rem;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: rgba(255,255,255,0.04);
      color: var(--text-main);
      font-family: inherit;
      min-width: 110px;
    }

    .empty-state {
      padding: 1rem;
      color: var(--text-muted);
      border: 1px dashed var(--border-color);
      border-radius: 14px;
      text-align: center;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.8rem 1rem;
      border-radius: 10px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .btn-primary:hover {
      background: #43a047;
      transform: translateY(-1px);
    }

    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 650px;
    }

    th, td {
      padding: 0.95rem 0.8rem;
      text-align: left;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    th {
      color: var(--text-muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    tbody tr:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    .role-badge {
      display: inline-block;
      padding: 0.28rem 0.7rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: capitalize;
      border: 1px solid transparent;
    }

    .role-badge.manager {
      background: var(--accent-soft);
      color: var(--accent);
      border-color: var(--accent-border);
    }

    .role-badge.employee {
      background: var(--blue-soft);
      color: var(--blue);
      border-color: rgba(59, 130, 246, 0.2);
    }

    .state {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--text-muted);
    }

    .spinner {
      width: 38px;
      height: 38px;
      border: 3px solid rgba(255,255,255,0.16);
      border-top-color: var(--accent);
      border-radius: 50%;
      margin: 0 auto 1rem;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status-message {
      margin-top: 0.75rem;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .status-message.error {
      color: #fda4af;
    }

    .status-message.success {
      color: #86efac;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      z-index: 2000;
    }

    .modal {
      width: min(100%, 480px);
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 1.25rem;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.35);
    }

    .modal h3 {
      margin-bottom: 1rem;
      font-size: 1.15rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      margin-bottom: 0.8rem;
    }

    .field label {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .field input,
    .field select {
      padding: 0.8rem 0.9rem;
      border-radius: 10px;
      border: 1px solid var(--border-color);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-main);
      font-family: inherit;
      outline: none;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
      margin-top: 1rem;
    }

    .btn-secondary {
      background: transparent;
      color: var(--text-main);
      border: 1px solid var(--border-color);
      padding: 0.8rem 1rem;
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
    }

    @media (max-width: 860px) {
      header { padding: 0 1rem; }
      nav {
        display: none;
        position: fixed;
        top: 75px;
        left: 0;
        right: 0;
        background: var(--bg-card);
        border-bottom: 1px solid var(--border-color);
        flex-direction: column;
        padding: 1rem;
        gap: 0.75rem;
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      }
      nav.active { display: flex; }
      .mobile-menu-btn { display: block; }
      .welcome-text { display: none; }
      .main-container { padding: 1rem 0.9rem 2rem; }
    }
  </style>
</head>
<body>
  <div id="teamContent">
    <header>
      <div class="header-left">
        <div class="logo-container">
          <span class="logo-icon">✅</span>
          <span class="logo-text">TaskFlow</span>
        </div>
        <nav id="topNav">
          <a href="dashboard.html" class="nav-link">Dashboard</a>
          <a href="tasks.html" class="nav-link">Tasks</a>
          <a href="team.html" class="nav-link active">Team</a>
          <a href="settings.html" class="nav-link">Settings</a>
        </nav>
      </div>
      <div class="header-right">
        <span class="welcome-text" id="welcomeMsg">Welcome</span>
        <button class="btn-logout" onclick="handleLogout(event)">Logout</button>
        <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>
      </div>
    </header>

    <main class="main-container">
      <section class="page-title">
        <div>
          <h1>Team Management</h1>
          <p>Manage your team, review roles, and add new employees.</p>
        </div>
      </section>

      <section class="stats-grid">
        <div class="stat-card">
          <div>
            <div class="stat-label">Total Users</div>
            <div class="stat-value" id="statTotal">0</div>
          </div>
          <div class="stat-icon">👥</div>
        </div>
        <div class="stat-card">
          <div>
            <div class="stat-label">Pending Review</div>
            <div class="stat-value" id="statPending">0</div>
          </div>
          <div class="stat-icon">⏳</div>
        </div>
        <div class="stat-card">
          <div>
            <div class="stat-label">Active Members</div>
            <div class="stat-value" id="statActive">0</div>
          </div>
          <div class="stat-icon">💼</div>
        </div>
      </section>

      <section class="card">
        <div class="card-header">
          <div class="card-title">Approval & Management</div>
          <button class="btn-primary" id="addEmployeeBtn">Add Employee</button>
        </div>

        <div id="loadingState" class="state">
          <div class="spinner"></div>
          <p>Loading team members...</p>
        </div>

        <div id="pendingSection" style="display:none; margin-bottom: 1.25rem;">
          <div class="card-title" style="margin-bottom:0.8rem;">Pending Approval</div>
          <div id="pendingApprovalList" class="section-grid"></div>
        </div>

        <div id="activeSection" style="display:none;">
          <div class="card-title" style="margin-bottom:0.8rem;">Active Members</div>
          <div id="activeMembersList" class="section-grid"></div>
        </div>
        <div id="statusMessage" class="status-message"></div>
      </section>
    </main>
  </div>

  <div id="modalBackdrop" class="modal-backdrop">
    <div class="modal">
      <h3>Add Employee</h3>
      <form id="addEmployeeForm">
        <div class="field">
          <label for="employeeName">Name</label>
          <input id="employeeName" name="name" required />
        </div>
        <div class="field">
          <label for="employeeEmail">Email</label>
          <input id="employeeEmail" name="email" type="email" required />
        </div>
        <div class="field">
          <label for="employeePassword">Password</label>
          <input id="employeePassword" name="password" type="password" required />
        </div>
        <div class="field">
          <label for="employeeRole">Role</label>
          <select id="employeeRole" name="role">
            <option value="employee">Employee</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" id="cancelAddBtn">Cancel</button>
          <button type="submit" class="btn-primary">Create Employee</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let currentUser = null;
    let allUsers = [];

    const user = JSON.parse(localStorage.getItem('taskflow_user'));
    if (!user) window.location.href = 'index.html';
    if (user && user.role === 'employee') window.location.href = 'my-tasks.html';
    if (user && user.role !== 'employee') {
      currentUser = user;
      document.getElementById('teamContent').style.display = 'flex';
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (!currentUser) return;
      document.getElementById('welcomeMsg').textContent = `Welcome, ${currentUser.name}`;
      document.getElementById('addEmployeeBtn').addEventListener('click', openModal);
      document.getElementById('cancelAddBtn').addEventListener('click', closeModal);
      document.getElementById('modalBackdrop').addEventListener('click', (event) => {
        if (event.target.id === 'modalBackdrop') closeModal();
      });
      document.getElementById('addEmployeeForm').addEventListener('submit', handleCreateEmployee);
      loadUsers();
    });

    function toggleMobileMenu() {
      document.getElementById('topNav').classList.toggle('active');
    }

    function handleLogout(event) {
      if (event) event.preventDefault();
      localStorage.removeItem('taskflow_user');
      window.location.href = 'index.html';
    }

    async function loadUsers() {
      try {
        const res = await fetch('/users');
        if (!res.ok) throw new Error('Unable to load team members right now.');
        const users = await res.json();
        const normalizedUsers = Array.isArray(users) ? users : [];

        const mergedUsers = [];
        const seen = new Set();

        normalizedUsers.forEach((user) => {
          const key = user.id || user.email || user.name;
          if (!key || seen.has(key)) return;
          seen.add(key);
          mergedUsers.push({
            id: user.id,
            name: user.name || 'Unknown',
            email: user.email || '—',
            role: user.role || 'employee',
            status: (user.status || 'active').toLowerCase()
          });
        });

        if (currentUser && !seen.has(currentUser.id || currentUser.email || currentUser.name)) {
          mergedUsers.unshift({
            id: currentUser.id,
            name: currentUser.name || 'Unknown',
            email: currentUser.email || '—',
            role: currentUser.role || 'manager',
            status: 'active'
          });
        }

        allUsers = mergedUsers;
        renderUsers();
      } catch (err) {
        console.error(err);
        showStatus(err.message, true);
        document.getElementById('loadingState').innerHTML = '<div class="state"><h3>Unable to load team members</h3><p>' + escapeHtml(err.message) + '</p></div>';
      }
    }

    function renderUsers() {
      const pendingList = document.getElementById('pendingApprovalList');
      const activeList = document.getElementById('activeMembersList');
      const loadingState = document.getElementById('loadingState');
      const pendingSection = document.getElementById('pendingSection');
      const activeSection = document.getElementById('activeSection');

      const pendingUsers = allUsers.filter((user) => user.status === 'pending');
      const activeUsers = allUsers.filter((user) => user.status === 'active');

      updateStats(allUsers);

      loadingState.style.display = 'none';
      pendingSection.style.display = pendingUsers.length ? 'block' : 'none';
      activeSection.style.display = activeUsers.length ? 'block' : 'none';

      pendingList.innerHTML = pendingUsers.length
        ? pendingUsers.map((user) => renderPendingCard(user)).join('')
        : '<div class="empty-state">No users pending approval.</div>';

      activeList.innerHTML = activeUsers.length
        ? activeUsers.map((user) => renderActiveCard(user)).join('')
        : '<div class="empty-state">No active members yet.</div>';
    }

    function renderPendingCard(user) {
      return `
        <div class="user-card">
          <div class="user-name">${escapeHtml(user.name || 'Unknown')}</div>
          <div class="user-email">${escapeHtml(user.email || '—')}</div>
          <div class="user-role">Role: ${escapeHtml((user.role || 'employee').toLowerCase())}</div>
          <span class="pill pending">Pending</span>
          <div class="actions-row">
            <button class="btn-approve" onclick="approveUser(${user.id})">Approve</button>
            <button class="btn-reject" onclick="rejectUser(${user.id})">Reject</button>
          </div>
        </div>
      `;
    }

    function renderActiveCard(user) {
      const role = (user.role || 'employee').toLowerCase();
      return `
        <div class="user-card">
          <div class="user-name">${escapeHtml(user.name || 'Unknown')}</div>
          <div class="user-email">${escapeHtml(user.email || '—')}</div>
          <div class="user-role">Role: ${escapeHtml(role)}</div>
          <span class="pill active">Active</span>
          <div class="actions-row">
            <select class="btn-role-select" onchange="changeUserRole(${user.id}, this.value)">
              <option value="employee" ${role === 'employee' ? 'selected' : ''}>Employee</option>
              <option value="manager" ${role === 'manager' ? 'selected' : ''}>Manager</option>
            </select>
            <button class="btn-delete" onclick="deleteUser(${user.id})">Delete</button>
          </div>
        </div>
      `;
    }

    function updateStats(users) {
      const total = users.length;
      const pending = users.filter((user) => user.status === 'pending').length;
      const active = users.filter((user) => user.status === 'active').length;
      document.getElementById('statTotal').textContent = total;
      document.getElementById('statPending').textContent = pending;
      document.getElementById('statActive').textContent = active;
    }

    function openModal() {
      document.getElementById('modalBackdrop').style.display = 'flex';
      document.getElementById('employeeName').focus();
    }

    function closeModal() {
      document.getElementById('modalBackdrop').style.display = 'none';
      document.getElementById('addEmployeeForm').reset();
      document.getElementById('employeeRole').value = 'employee';
      document.getElementById('statusMessage').textContent = '';
      document.getElementById('statusMessage').className = 'status-message';
    }

    async function handleCreateEmployee(event) {
      event.preventDefault();
      const form = event.target;
      const payload = {
        name: form.name.value.trim(),
        email: form.email.value.trim(),
        password: form.password.value,
        role: form.role.value || 'employee'
      };

      if (!payload.name || !payload.email || !payload.password) {
        showStatus('Please fill in all fields.', true);
        return;
      }

      try {
        const res = await fetch('/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || 'Unable to add employee.');

        showStatus('Employee added successfully and is pending approval.', false);
        closeModal();
        await loadUsers();
      } catch (err) {
        console.error(err);
        showStatus(err.message, true);
      }
    }

    async function approveUser(userId) {
      try {
        const res = await fetch(`/users/${userId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: 'active', current_user_role: currentUser.role })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || 'Unable to approve user.');
        showStatus('User approved successfully.', false);
        await loadUsers();
      } catch (err) {
        console.error(err);
        showStatus(err.message, true);
      }
    }

    async function rejectUser(userId) {
      try {
        const res = await fetch(`/users/${userId}`, {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ current_user_role: currentUser.role })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || 'Unable to reject user.');
        showStatus('User rejected and removed.', false);
        await loadUsers();
      } catch (err) {
        console.error(err);
        showStatus(err.message, true);
      }
    }

    async function changeUserRole(userId, newRole) {
      try {
        const res = await fetch(`/users/${userId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ role: newRole, status: 'active', current_user_role: currentUser.role })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || 'Unable to update role.');
        showStatus('Role updated successfully.', false);
        await loadUsers();
      } catch (err) {
        console.error(err);
        showStatus(err.message, true);
      }
    }

    async function deleteUser(userId) {
      try {
        const res = await fetch(`/users/${userId}`, {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ current_user_role: currentUser.role })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || 'Unable to delete user.');
        showStatus('User removed successfully.', false);
        await loadUsers();
      } catch (err) {
        console.error(err);
        showStatus(err.message, true);
      }
    }

    function showStatus(message, isError) {
      const status = document.getElementById('statusMessage');
      status.textContent = message;
      status.className = `status-message ${isError ? 'error' : 'success'}`;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
  </script>
</body>
